name: SonarCloudJava
on:
    workflow_dispatch:
        inputs:
            job-name:
             description: 'Select the job to run'
             required: true
             default: 'build-job'
             type: choice
             options:
                - build-job
                - sonar-analysis
jobs:
    build-job:
        if: ${{ github.event.inputs['job-name'] == 'build-job' }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                java-version: '17'
                distribution: 'temurin'
            - name: Build the code
              run: mvn package
    sonar-analysis:
        if: ${{ github.event.inputs['job-name'] == 'sonar-analysis' }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                java-version: '17'
                distribution: 'temurin'
            - name: Build the code
              run: mvn package
            - name: SonarQube Analysis
              run: |
                mvn sonar:sonar \
                  -Dsonar.projectKey=muskan-sonar-may2026_sonar-project-may2026 \
                  -Dsonar.host.url=https://sonarcloud.io \
                  -Dsonar.organization=smuskan-sonar-may2026 \
                  -Dsonar.token=$sonar_token
              env:
                github_token: ${{ secrets.GITHUB_TOKEN }}
                sonar_token: ${{ secrets.SONAR_TOKEN }}


