name: CI-MultipleJobsRunner
on:
    workflow_dispatch:
        inputs:
            runner:
                description: 'Select the runner to execute'
                required: true
                default: 'ubuntu-latest'
                type: choice
                options:
                    - ubuntu-latest
                    - windows-latest
                    - macos-latest
            job-name:
                description: 'Enter multiple jobs to run (comma separated)'
                required: true
                type: string
jobs:
    build-job:
        if: contains(github.event.inputs['job-name'], 'build-job')
        runs-on: ${{ github.event.inputs['runner'] }}
        steps:
            - name: build the code
              run: echo "Building the code..."
    test-job:
        if: contains(github.event.inputs['job-name'], 'test-job')
        runs-on: ${{ github.event.inputs['runner'] }}
        steps:
            - name: run tests
              run: echo "Running tests..."  
    deploy-job:
        if: contains(github.event.inputs['job-name'], 'deploy-job')
        runs-on: ${{ github.event.inputs['runner'] }}
        steps:
            - name: deploy the code
              run: echo "Deploying the code..." 
